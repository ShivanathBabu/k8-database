apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: roboshop
  labels:
    project: roboshop
    app: redis
    tier: database
spec:
  clusterIP: None
  selector:
    project: roboshop
    app: redis
    tier: database
  ports:
  - protocol: TCP
    port: 6379  
    targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    app: redis
    tier: database
spec:
  selector:
    project: roboshop
    app: redis
    tier: database
  ports:
  - protocol: TCP
    port: 6379  
    targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    app: redis
    tier: database
spec:
  selector:
    matchLabels:
      project: roboshop
      app: redis
      tier: database # has to match .spec.template.metadata.labels
  serviceName: "redis-headless"
  replicas: 2 # by default is 1
  template:
    metadata:
      labels:
        project: roboshop
        app: redis
        tier: database # has to match .spec.selector.matchLabels
    spec:
      containers:
      - name: redis
        image: redis:7.0
        volumeMounts:
        - name: redis-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "roboshop-sc"
      resources:
        requests:
          storage: 2Gi