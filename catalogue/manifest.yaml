apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    type: catalogue
    tier: app
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    type: catalogue
    tier: app
spec:
  replicas: 2
  selector:
    matchLabels:
      project: roboshop
      type: catalogue
      tier: app
  template:
    metadata:
      labels:
        project: roboshop
        type: catalogue
        tier: app
    spec:
      containers:
      - name: catalogue
        image: shivanathbabu/catalogue:v1
        envFrom:
        - ConfigMapRef:
            name: catalogue
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: catalogue
  labels:
    project: roboshop
    type: catalogue
    tier: app
spec:
  selector:
    project: roboshop
    type: catalogue
    tier: app
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
---

  
